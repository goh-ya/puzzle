<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拍照拼圖</title>

<!-- Handwritten + typewriter fonts -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<style>
/* ============================
   RESET & BASE
   ============================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100%;
  background: #f4f1eb;
  font-family: 'Caveat', cursive;
  color: #1a1a1a;
  overflow-x: hidden;
}

/* ============================
   LAYOUT
   ============================ */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 16px 52px;
  gap: 22px;
}

/* ============================
   HEADER
   ============================ */
header {
  text-align: center;
}

header h1 {
  font-family: 'Special Elite', cursive;
  font-size: 1.9rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: #1a1a1a;
  line-height: 1.1;
}

header p {
  font-size: 0.88rem;
  color: #777;
  margin-top: 5px;
}

.hand-rule {
  width: 140px;
  height: 10px;
  margin: 2px auto 0;
  display: block;
}

/* ============================
   CAMERA SECTION
   ============================ */
#camera-section {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

/* Sketchy border = hard offset box-shadow */
#video-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #111;
  border: 2px solid #1a1a1a;
  border-radius: 2px;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transform: scaleX(-1);
}

#overlay-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}

#freeze-overlay {
  position: absolute;
  inset: 0;
  background: #f4f1eb;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.12s ease;
}
#freeze-overlay.flash { opacity: 1; }

#status-badge {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a;
  color: #f4f1eb;
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  padding: 3px 14px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
#status-badge.visible { opacity: 1; }

#countdown-ring {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#countdown-ring.visible { opacity: 1; }
#countdown-ring svg { width: 78px; height: 78px; }
.ring-track { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 4; }
.ring-fill  {
  fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: butt;
  transform-origin: center; transform: rotate(-90deg);
  stroke-dasharray: 220; stroke-dashoffset: 220;
  transition: stroke-dashoffset 0.1s linear;
}
#countdown-number {
  position: absolute;
  font-family: 'Special Elite', cursive;
  font-size: 2rem;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
}

/* Detection indicator */
#detection-mode {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  color: #666;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ccc;
  border: 1.5px solid #aaa;
}
.dot.active {
  background: #1a1a1a;
  border-color: #1a1a1a;
  animation: blink 1s step-start infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* ============================
   BUTTONS — flat, no gradient
   Sketchy: square corners, hard shadow
   ============================ */
.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  width: 100%;
}

button {
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  font-weight: 400;
  cursor: pointer;
  padding: 9px 20px;
  border: 2px solid #1a1a1a;
  border-radius: 2px;
  background: #f4f1eb;
  color: #1a1a1a;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent;
}
button:hover  { transform: translate(-1px,-1px); background: #c5c2ba;}
button:active { transform: translate(2px,2px)!important; background: #c5c2ba; }

.btn-primary {
  background: #1a1a1a;
  color: #f4f1eb;
}
.btn-primary:hover  { background: #444; }
.btn-primary:active { background: #444!important; }

.btn-ghost {
  border: none;
  box-shadow: none;
  background: transparent;
  font-size: 0.92rem;
  color: #888;
  text-decoration: underline;
  text-underline-offset: 3px;
  padding: 6px 8px;
}
.btn-ghost:hover  { color: #1a1a1a; box-shadow: none; transform: none; }
.btn-ghost:active { box-shadow: none!important; transform: none!important; }

button:disabled { opacity: 0.32; pointer-events: none; }

#tip-text {
  font-size: 0.88rem;
  color: #999;
  text-align: center;
  line-height: 1.65;
}

/* ============================
   PUZZLE SECTION
   ============================ */
#puzzle-section {
  width: 100%;
  max-width: 360px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: slideUp 0.38s ease both;
}
#puzzle-section.visible { display: flex; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

#move-count {
  font-size: 1rem;
  color: #777;
  font-style: italic;
  letter-spacing: 0.04em;
}
#move-count span { color: #1a1a1a; font-weight: 700; font-style: normal; }

/* Wrapper with sketchy border */
#puzzle-grid-wrapper {
  display: inline-flex;
  padding: 8px;
  background: #f4f1eb;
  border: 2px solid #1a1a1a;
  box-shadow: 5px 5px 0 #1a1a1a;
}

/* Grid: 3×3 fixed cells, gap acts as line */
#puzzle-grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows:    repeat(3, 100px);
  gap: 3px;
  background: #1a1a1a;
}

.puzzle-piece {
  width: 100px;
  height: 100px;
  overflow: hidden;
  cursor: pointer;
  background: #d8d4cc;
  position: relative;
  outline: 2px solid transparent;
  outline-offset: -2px;
  transition: outline-color 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  user-select: none;
}

.puzzle-piece img {
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.puzzle-piece.selected  { outline-color: #1a1a1a; opacity: 0.78; }
.puzzle-piece.drag-over { outline: 3px dashed #1a1a1a; outline-offset: -3px; }
.puzzle-piece.dragging  { opacity: 0.35; }
.puzzle-piece.correct   { animation: correctFlash 0.45s ease; }

@keyframes correctFlash {
  0%   { outline: 3px solid #1a1a1a; outline-offset: -3px; }
  50%  { outline: 3px solid #1a1a1a; outline-offset: -7px; }
  100% { outline: 2px solid transparent; outline-offset: -2px; }
}

/* ============================
   SUCCESS OVERLAY
   ============================ */
#success-overlay {
  position: fixed;
  inset: 0;
  background: #f4f1eb;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 12px;
  text-align: center;
  padding: 36px;
}
#success-overlay.visible { display: flex; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.success-rule {
  width: 180px; height: 2px;
  background: #1a1a1a;
}

.success-title {
  font-family: 'Special Elite', cursive;
  font-size: 3.2rem;
  font-weight: 400;
  color: #1a1a1a;
  letter-spacing: 0.12em;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
}

.success-sub {
  font-size: 1.15rem;
  color: #666;
  font-style: italic;
  animation: slideUp 0.4s 0.15s ease both;
}

.success-stats {
  font-size: 1rem;
  color: #999;
  animation: slideUp 0.4s 0.25s ease both;
}
.success-stats strong { color: #1a1a1a; }

/* Confetti canvas */
#confetti-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 99;
  display: none;
}
#confetti-canvas.visible { display: block; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Success screen -->
<div id="success-overlay">
  <div class="success-rule"></div>
  <div class="success-title">✿✿✿ SUCCESS ✿✿✿</div>
  <div class="success-sub">拼圖完成了，恭喜獲得一朵花花</div>
  <div class="success-stats">共移動 <strong id="final-moves">0</strong> 步</div>
  <div class="success-rule"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn-primary" onclick="resetAll()">再玩一次</button>
  </div>
</div>

<div id="app">

  <header>
    <!-- Hand-drawn wavy rule as SVG -->
    <h1>✿ Photo Puzzle ✿</h1>
    <p>拍照 打亂 拼回來</p>
    <svg class="hand-rule" viewBox="0 0 140 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 7 C10 2, 18 12, 26 7 S42 2, 50 7 S66 12, 74 7 S90 2, 98 7 S114 12, 122 7 S134 4, 138 7"
            stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </svg>
  </header>

  <!-- Camera view -->
  <section id="camera-section">
    <div id="video-wrapper">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay-canvas"></canvas>
      <div id="freeze-overlay"></div>
      <div id="status-badge"></div>
      <div id="countdown-ring">
        <svg viewBox="0 0 80 80">
          <circle class="ring-track" cx="40" cy="40" r="35"/>
          <circle class="ring-fill"  id="ring-fill" cx="40" cy="40" r="35"/>
        </svg>
        <div id="countdown-number">2</div>
      </div>
    </div>

    <div id="detection-mode">
      <div class="dot" id="detect-dot"></div>
      <span id="detect-label">偵測未啟動</span>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-camera" onclick="startCamera()">Open Camera</button>
      <button id="btn-capture" onclick="capturePhoto()" disabled>Cheese~~~(拍)</button>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" id="btn-restart" onclick="resetAll()" disabled>Start Over</button>
    </div>

    <p id="tip-text">開啟相機後，雙手張開保持穩定 2 秒，即可自動拍照</p>
  </section>

  <!-- Puzzle view -->
  <section id="puzzle-section">
    <div id="move-count">moves : <span id="moves-display">0</span></div>
    <div id="puzzle-grid-wrapper">
      <div id="puzzle-grid"></div>
    </div>
    <div class="btn-row">
      <button onclick="shufflePuzzle()">Disorder Again</button>
      <button class="btn-ghost" onclick="resetAll()">Start Over</button>
    </div>
  </section>

</div>

<script>
/* ============================================================
   SECTION 1: State & DOM refs
   ============================================================ */
const video         = document.getElementById('video');
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx    = overlayCanvas.getContext('2d');
const statusBadge   = document.getElementById('status-badge');
const countdownRing = document.getElementById('countdown-ring');
const ringFill      = document.getElementById('ring-fill');
const countdownNum  = document.getElementById('countdown-number');
const freezeOverlay = document.getElementById('freeze-overlay');
const detectDot     = document.getElementById('detect-dot');
const detectLabel   = document.getElementById('detect-label');
const puzzleSection = document.getElementById('puzzle-section');
const puzzleGrid    = document.getElementById('puzzle-grid');
const movesDisplay  = document.getElementById('moves-display');
const finalMoves    = document.getElementById('final-moves');
const confettiCanvas= document.getElementById('confetti-canvas');

let stream            = null;
let hands             = null;

// Puzzle
let pieces            = [];  // [{correctIndex, currentIndex}]
let pieceDataURLs     = [];  // pieceDataURLs[correctIndex] = dataURL string
let moveCount         = 0;
let selectedIndex     = null;
let dragSourceIndex   = null;

// Auto-capture
let stableFrames      = 0;
const STABLE_NEEDED   = 60;   // ~2s at 30fps
let autoCaptureEnabled= false;
let captureInProgress = false;

/* ============================================================
   SECTION 2: Camera
   ============================================================ */
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    video.play();

    syncCanvasSize();
    window.addEventListener('resize', syncCanvasSize);

    document.getElementById('btn-camera').disabled  = true;
    document.getElementById('btn-capture').disabled = false;
    document.getElementById('btn-restart').disabled = false;

    initMediaPipe();
  } catch (err) {
    alert('無法開啟相機：' + err.message);
  }
}

function syncCanvasSize() {
  const rect = video.getBoundingClientRect();
  overlayCanvas.width  = rect.width;
  overlayCanvas.height = rect.height;
}

/* ============================================================
   SECTION 3: MediaPipe Hands
   ============================================================ */
function initMediaPipe() {
  hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onHandResults);

  const mpCamera = new Camera(video, {
    onFrame: async () => { if (hands) await hands.send({ image: video }); },
    width: 640, height: 480
  });
  mpCamera.start();

  autoCaptureEnabled = true;
  detectDot.classList.add('active');
  detectLabel.textContent = '手部偵測中…';
}

function onHandResults(results) {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const w = overlayCanvas.width, h = overlayCanvas.height;

  const lmAll = results.multiHandLandmarks;

  if (!lmAll || lmAll.length < 2) {
    stableFrames = Math.max(0, stableFrames - 3);
    if (stableFrames === 0) hideCountdown();
    detectLabel.textContent = (lmAll && lmAll.length === 1) ? '再伸出另一隻手～' : '請將雙手伸入畫面';
    return;
  }

  lmAll.forEach((lm, i) => drawHandBox(lm, w, h, i));

  if (autoCaptureEnabled && !captureInProgress) {
    if (checkFrameGesture(lmAll)) {
      stableFrames++;
      showCountdown(stableFrames / STABLE_NEEDED);
      if (stableFrames >= STABLE_NEEDED) {
        stableFrames = 0;
        hideCountdown();
        capturePhoto();
      }
    } else {
      stableFrames = Math.max(0, stableFrames - 2);
      if (stableFrames === 0) hideCountdown();
    }
  }

  detectLabel.textContent = '偵測到雙手 ✓';
}

function drawHandBox(landmarks, w, h, idx) {
  const xs = landmarks.map(l => l.x * w);
  const ys = landmarks.map(l => l.y * h);
  const x0 = Math.min(...xs) - 10, y0 = Math.min(...ys) - 10;
  const x1 = Math.max(...xs) + 10, y1 = Math.max(...ys) + 10;
  overlayCtx.save();
  overlayCtx.strokeStyle = 'rgba(255,255,255,0.85)';
  overlayCtx.lineWidth   = 2;
  overlayCtx.setLineDash([6, 4]);
  overlayCtx.strokeRect(x0, y0, x1 - x0, y1 - y0);
  overlayCtx.restore();
}

function checkFrameGesture(lmAll) {
  return Math.abs(lmAll[0][0].x - lmAll[1][0].x) > 0.28;
}

function showCountdown(progress) {
  countdownRing.classList.add('visible');
  ringFill.style.strokeDashoffset = 220 * (1 - progress);
  countdownNum.textContent = Math.max(1, Math.ceil((1 - progress) * 2));
  statusBadge.textContent  = '保持穩定…';
  statusBadge.classList.add('visible');
}
function hideCountdown() {
  countdownRing.classList.remove('visible');
  statusBadge.classList.remove('visible');
}

/* ============================================================
   SECTION 4: Capture Photo
   drawImage(video) → canvas → toDataURL
   ============================================================ */
function capturePhoto() {
  if (!stream || captureInProgress) return;
  captureInProgress  = true;
  autoCaptureEnabled = false;

  // Flash
  freezeOverlay.classList.add('flash');
  setTimeout(() => freezeOverlay.classList.remove('flash'), 200);

  // Step 1: draw video frame into a square canvas (mirrored)
  const offscreen = document.createElement('canvas');
  const vw   = video.videoWidth  || 640;
  const vh   = video.videoHeight || 480;
  const size = Math.min(vw, vh);
  offscreen.width  = size;
  offscreen.height = size;

  const ctx = offscreen.getContext('2d');
  ctx.translate(size, 0);   // mirror
  ctx.scale(-1, 1);
  ctx.drawImage(video, (vw - size) / 2, (vh - size) / 2, size, size, 0, 0, size, size);

  // Step 2: toDataURL from the full captured canvas
  const dataURL = offscreen.toDataURL('image/jpeg', 0.92);

  // Step 3: hide camera, show puzzle
  setTimeout(() => {
    document.getElementById('camera-section').style.display = 'none';
    buildPuzzle(dataURL, size);
  }, 340);
}

/* ============================================================
   SECTION 5: Build Puzzle
   Slice image into 9 pieces, store each as dataURL
   ============================================================ */
function buildPuzzle(dataURL, size) {
  pieces        = [];
  pieceDataURLs = [];
  puzzleGrid.innerHTML = '';
  moveCount = 0;
  movesDisplay.textContent = '0';

  const img = new Image();
  img.onload = () => {
    const ps = Math.floor(size / 3); // pixels per piece

    for (let i = 0; i < 9; i++) {
      const row = Math.floor(i / 3), col = i % 3;

      // Draw slice into own canvas
      const pc = document.createElement('canvas');
      pc.width = ps; pc.height = ps;
      pc.getContext('2d').drawImage(img,
        col * ps, row * ps, ps, ps,  // source
        0, 0, ps, ps                  // dest
      );

      // Store as dataURL — safe across DOM rebuilds (no cloneNode!)
      pieceDataURLs.push(pc.toDataURL('image/jpeg', 0.9));
      pieces.push({ correctIndex: i, currentIndex: i });
    }

    shufflePuzzle(false);
    renderGrid();
    puzzleSection.classList.add('visible');
  };
  img.src = dataURL;
}

/* ============================================================
   SECTION 6: Shuffle
   ============================================================ */
function shufflePuzzle(rebuild = true) {
  if (!pieces.length) return;

  // Fisher-Yates on currentIndex
  const idx = pieces.map(p => p.currentIndex);
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  pieces.forEach((p, i) => p.currentIndex = idx[i]);

  if (isSolved()) shufflePuzzle(false);  // retry if accidentally solved

  if (rebuild) {
    renderGrid();
    moveCount = 0;
    movesDisplay.textContent = '0';
    selectedIndex = null;
  }
}

/* ============================================================
   SECTION 7: Render Grid
   Use <img src=dataURL> — never cloneNode canvas
   ============================================================ */
function renderGrid() {
  puzzleGrid.innerHTML = '';
  selectedIndex = null;

  // Sort pieces by currentIndex so grid position matches array order
  const sorted = [...pieces].sort((a, b) => a.currentIndex - b.currentIndex);

  sorted.forEach((piece, gridPos) => {
    const el = document.createElement('div');
    el.className = 'puzzle-piece';
    el.dataset.gridPos = String(gridPos);

    const img = document.createElement('img');
    img.src       = pieceDataURLs[piece.correctIndex]; // correct image for this piece
    img.draggable = false;
    el.appendChild(img);

    // Click / tap
    el.addEventListener('click', () => onPieceClick(gridPos));

    // Desktop drag-and-drop
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      dragSourceIndex = gridPos;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', e => {
      e.preventDefault();
      clearClass('drag-over');
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      clearClass('drag-over');
      if (dragSourceIndex !== null && dragSourceIndex !== gridPos) doSwap(dragSourceIndex, gridPos);
      dragSourceIndex = null;
    });

    // Mobile touch
    el.addEventListener('touchstart', e => onTouchStart(e, gridPos), { passive: true });
    el.addEventListener('touchmove',  onTouchMove, { passive: false });
    el.addEventListener('touchend',   e => onTouchEnd(e, gridPos));

    puzzleGrid.appendChild(el);
  });

  markCorrectPieces();
}

function clearClass(cls) {
  puzzleGrid.querySelectorAll('.' + cls).forEach(el => el.classList.remove(cls));
}
function getEl(gp) { return puzzleGrid.querySelector(`[data-grid-pos="${gp}"]`); }

/* ============================================================
   SECTION 8: Tap-to-swap
   ============================================================ */
function onPieceClick(gridPos) {
  if (selectedIndex === null) {
    selectedIndex = gridPos;
    getEl(gridPos)?.classList.add('selected');
  } else {
    const prev = selectedIndex;
    selectedIndex = null;
    getEl(prev)?.classList.remove('selected');
    if (prev !== gridPos) doSwap(prev, gridPos);
  }
}

/* ============================================================
   SECTION 9: Touch drag
   ============================================================ */
let touchStart = null, touchSrc = null;

function onTouchStart(e, gridPos) {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  touchSrc   = gridPos;
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  clearClass('drag-over');
  const hit = document.elementFromPoint(t.clientX, t.clientY);
  hit?.closest?.('.puzzle-piece')?.classList.add('drag-over');
}
function onTouchEnd(e, gridPos) {
  const t = e.changedTouches[0];
  clearClass('drag-over');
  const moved = touchStart &&
    (Math.abs(t.clientX - touchStart.x) > 12 || Math.abs(t.clientY - touchStart.y) > 12);

  if (!moved) {
    onPieceClick(gridPos);
  } else {
    const hit  = document.elementFromPoint(t.clientX, t.clientY);
    const tPos = parseInt(hit?.closest?.('.puzzle-piece')?.dataset.gridPos ?? '-1');
    if (tPos >= 0 && tPos !== touchSrc) { doSwap(touchSrc, tPos); selectedIndex = null; }
  }
  touchSrc = null;
}

/* ============================================================
   SECTION 10: Swap
   ============================================================ */
function doSwap(posA, posB) {
  const a = pieces.find(p => p.currentIndex === posA);
  const b = pieces.find(p => p.currentIndex === posB);
  if (!a || !b) return;

  [a.currentIndex, b.currentIndex] = [b.currentIndex, a.currentIndex];
  moveCount++;
  movesDisplay.textContent = moveCount;

  renderGrid();
  if (isSolved()) setTimeout(showSuccess, 380);
}

function isSolved() {
  return pieces.every(p => p.correctIndex === p.currentIndex);
}

function markCorrectPieces() {
  const sorted = [...pieces].sort((a, b) => a.currentIndex - b.currentIndex);
  puzzleGrid.querySelectorAll('.puzzle-piece').forEach((el, gp) => {
    if (sorted[gp]?.correctIndex === sorted[gp]?.currentIndex) el.classList.add('correct');
  });
}

/* ============================================================
   SECTION 11: Success + Confetti (monochrome)
   ============================================================ */
function showSuccess() {
  finalMoves.textContent = moveCount;
  document.getElementById('success-overlay').classList.add('visible');
  confettiCanvas.classList.add('visible');
  startConfetti();
}

let confettiRaf = null;
function startConfetti() {
  const ctx = confettiCanvas.getContext('2d');
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;

  const grays  = ['#1a1a1a','#555','#888','#bbb','#f4f1eb','#ccc'];
  const shapes = ['rect','line','circle'];
  const parts  = Array.from({ length: 90 }, () => ({
    x: Math.random() * confettiCanvas.width,
    y: -Math.random() * confettiCanvas.height * 0.5,
    w: Math.random() * 10 + 4,
    h: Math.random() * 5  + 3,
    c: grays[Math.floor(Math.random() * grays.length)],
    s: Math.random() * 2.2 + 1,
    a: Math.random() * Math.PI * 2,
    r: (Math.random() - 0.5) * 0.14,
    d: (Math.random() - 0.5) * 0.7,
    shape: shapes[Math.floor(Math.random() * shapes.length)]
  }));

  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    parts.forEach(p => {
      p.y += p.s; p.x += p.d; p.a += p.r;
      if (p.y > confettiCanvas.height) { p.y = -10; p.x = Math.random() * confettiCanvas.width; }
      ctx.save();
      ctx.fillStyle = ctx.strokeStyle = p.c;
      ctx.lineWidth = 2;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.a);
      if      (p.shape === 'rect')   ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      else if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0,p.h,0,Math.PI*2); ctx.fill(); }
      else                           { ctx.beginPath(); ctx.moveTo(-p.w/2,0); ctx.lineTo(p.w/2,0); ctx.stroke(); }
      ctx.restore();
    });
    if (++frame < 320) confettiRaf = requestAnimationFrame(tick);
    else ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
  tick();
}

/* ============================================================
   SECTION 12: Reset
   ============================================================ */
function resetAll() {
  if (confettiRaf) { cancelAnimationFrame(confettiRaf); confettiRaf = null; }
  confettiCanvas.classList.remove('visible');
  document.getElementById('success-overlay').classList.remove('visible');
  puzzleSection.classList.remove('visible');

  puzzleGrid.innerHTML = '';
  pieces = []; pieceDataURLs = [];
  moveCount = 0; selectedIndex = null;
  captureInProgress = false;

  const cam = document.getElementById('camera-section');
  cam.style.display = 'flex';

  autoCaptureEnabled = !!stream;
  stableFrames = 0;
  hideCountdown();
  detectLabel.textContent = stream ? '手部偵測中…' : '偵測未啟動';
}
</script>
